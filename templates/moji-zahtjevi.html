<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moji zahtjevi</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Ključni dio za nove redove */
        .text-description {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9rem;
            max-width: 400px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 shadow">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1">📋 Moji zahtjevi</span>
        <div class="ms-auto d-flex align-items-center">
            <a href="/" class="btn btn-outline-light btn-sm me-3">➕ Novi zahtjev</a>
            <span class="text-light small">👤 <strong>{{ username }}</strong></span>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="card shadow p-4">
        <div class="table-responsive">
            <table id="myTicketsTable" class="table table-hover align-middle w-100">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Vrsta</th>
                        <th>Opis</th>
                        <th>Zadovoljstvo (Survey)</th>
                        <th>Vrijeme</th>
                    </tr>
                </thead>
                <tbody>
                    {{ table_rows }}
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="mt-5 mb-4 text-center text-muted">
    <hr class="w-25 mx-auto">
    <small>Developed by <strong>PIOPET 2026</strong> | IT Infrastructure</small>
</footer>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    async function submitSurvey(id, ratingValue) {
        let formData = new FormData();
        formData.append('ticket_id', id);
        formData.append('rating', ratingValue);
        const response = await fetch('/submit-survey', { method: 'POST', body: formData });
        if (response.ok) location.reload();
    }

    $(document).ready(function() {
        $('#myTicketsTable').DataTable({
            "order": [[ 0, "desc" ]],
            "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/hr.json" }
        });
    });
</script>
</body>
</html>
