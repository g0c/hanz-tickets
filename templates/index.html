<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustav Zahtjeva | hanz-tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1">🚀 hanz-tickets</span>
        <div class="ms-auto d-flex align-items-center">
            <a href="/moji-zahtjevi" class="btn btn-outline-light btn-sm me-3">📋 Moji Zahtjevi</a>
            <span class="text-light small">👤 Prijavljen: <strong>{{ username }}</strong></span>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card mx-auto shadow-lg" style="max-width: 700px;">
        <div class="card-header text-center">
            <h4 class="mb-0 py-2">Novi IT Zahtjev</h4>
        </div>
        <div class="card-body p-4">
            <form id="requestForm">
                <div class="mb-4">
                    <label class="form-label fw-bold">Što trebate?</label>
                    <select class="form-select form-select-lg" id="request_type" name="request_type" required>
                        <option value="" selected disabled>Odaberite kategoriju...</option>
                        {{ request_options }}
                    </select>
                </div>

                <div class="mb-4" id="pathInputContainer" style="display: none;">
                    <label class="form-label fw-bold text-danger">Mrežna putanja (UNC)</label>
                    <input type="text" class="form-control" name="file_path" id="file_path" placeholder="\\server\share">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Opis zahtjeva</label>
                    <textarea class="form-control" name="description" rows="4" required placeholder="Detaljno opišite problem ili zahtjev..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 shadow">Pošalji IT-u</button>
            </form>
            
            <div id="responseMessage" class="mt-3"></div>

            <div class="mt-4 pt-3 border-top">
                <p class="text-center small text-muted mb-0">
                    Vaš identitet je automatski potvrđen putem Active Directory sustava. <br>
                    Svi zahtjevi se trajno bilježe radi usklađenosti i revizije (Compliance).
                </p>
            </div>
        </div>
    </div>
    
    <footer class="mt-5 mb-4 text-center text-muted">
        <hr class="w-25 mx-auto">
        <small>Developed by <strong>piopet 2026</strong> | IT Infrastructure</small>
    </footer>
</div>

<script src="/static/script.js"></script>
<script>
    const typeSelect = document.getElementById('request_type');
    const pathContainer = document.getElementById('pathInputContainer');
    
    typeSelect.addEventListener('change', function() {
        if (this.value === 'Backup/Restore' || this.value === 'Permissions') {
            pathContainer.style.display = 'block';
            document.getElementById('file_path').required = true;
        } else {
            pathContainer.style.display = 'none';
            document.getElementById('file_path').required = false;
        }
    });
</script>
</body>
</html>
