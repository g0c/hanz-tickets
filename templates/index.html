<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustav Zahtjeva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid justify-content-end px-4">
        <span class="text-light">👤 Prijavljen: <strong>{{ username }}</strong></span>
    </div>
</nav>

<div class="container">
    <div class="card mx-auto" style="max-width: 700px;">
        <div class="card-header text-center">
            <h4 class="mb-0">Novi IT Zahtjev</h4>
        </div>
        <div class="card-body p-4">
            <form id="requestForm">
                <div class="mb-4">
                    <label class="form-label fw-bold">Što trebate?</label>
                    <select class="form-select form-select-lg" id="request_type" name="request_type" required>
                        <option value="" selected disabled>Odaberite kategoriju...</option>
                        {{ request_options }}
                    </select>
                </div>

                <div class="mb-4" id="pathInputContainer" style="display: none;">
                    <label class="form-label fw-bold text-danger">Mrežna putanja (UNC)</label>
                    <input type="text" class="form-control" name="file_path" id="file_path" placeholder="\\server\share">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Opis</label>
                    <textarea class="form-control" name="description" rows="4" required placeholder="Opišite detaljno..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Pošalji IT-u</button>
            </form>
            <div id="responseMessage" class="mt-3"></div>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
<script>
    const typeSelect = document.getElementById('request_type');
    const pathContainer = document.getElementById('pathInputContainer');
    
    typeSelect.addEventListener('change', function() {
        if (this.value === 'Backup/Restore' || this.value === 'Permissions') {
            pathContainer.style.display = 'block';
            document.getElementById('file_path').required = true;
        } else {
            pathContainer.style.display = 'none';
            document.getElementById('file_path').required = false;
        }
    });
</script>
</body>
</html>
