<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .text-description {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9rem;
            max-width: 400px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1">🚀 Admin kontrola</span>
        <span class="text-light">👤 Administrator: <strong>{{ username }}</strong></span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="card shadow">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Upravljanje Ticketima</h5>
            <button class="btn btn-sm btn-light" onclick="location.reload()">Osvježi</button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="ticketsTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Korisnik</th>
                            <th>Status</th>
                            <th>Tip</th>
                            <th>Putanja</th>
                            <th style="width: 30%;">Opis</th>
                            <th>Ocjena</th>
                            <th>Vrijeme</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{ table_rows }}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Ažuriranje zahtjeva <span id="modalTicketId"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Mijenjate status u: <strong id="modalNewStatus"></strong></p>
                <div class="mb-3">
                    <label for="adminFeedback" class="form-label">Povratna informacija korisniku (opcionalno):</label>
                    <textarea class="form-control" id="adminFeedback" rows="3" placeholder="Npr. Printer je popravljen, provjerite rad..."></textarea>
                </div>
                <input type="hidden" id="hiddenTicketId">
                <input type="hidden" id="hiddenNewStatus">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Odustani</button>
                <button type="button" class="btn btn-primary" onclick="confirmStatusUpdate()">Spremi promjene</button>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 mb-4 text-center text-muted">
    <hr class="w-25 mx-auto">
    <small>Developed by <strong>PIOPET 2026</strong> | IT Infrastructure</small>
</footer>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="/static/script.js"></script>

<script>
    $(document).ready(function() {
        $('#ticketsTable').DataTable({ 
            "order": [[ 0, "desc" ]],
            "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/hr.json" }
        });
    });
</script>
</body>
</html>
