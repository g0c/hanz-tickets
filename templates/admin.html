<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Zahtjevi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1">🚀 Zahtjevi - Admin Kontrola</span>
        <span class="text-light">👤 Administrator: <strong>{{username}}</strong></span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Upravljanje Ticketima</h5>
            <button class="btn btn-sm btn-light" onclick="location.reload()">Osvježi listu</button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="ticketsTable" class="table table-hover align-middle w-100">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Korisnik</th>
                            <th>Status</th>
                            <th>Tip</th>
                            <th>Putanja</th>
                            <th>Opis</th>
                            <th>Vrijeme</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{table_rows}}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 mb-4 text-center">
    <hr class="w-25 mx-auto">
    <small>Developed by <strong>piopet 2026</strong> | IT Infrastructure</small>
</footer>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function() {
        $('#ticketsTable').DataTable({
            "order": [[ 0, "desc" ]], // Najnoviji na vrhu
            "pageLength": 10,
            "language": {
                "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/hr.json" // Prijevod na hrvatski
            }
        });
    });
</script>
</body>
</html>
