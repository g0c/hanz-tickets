<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | hanz-tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1">🚀 Admin Kontrola</span>
        <span class="text-light">👤 Administrator: <strong>{{ username }}</strong></span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="card shadow">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Upravljanje Ticketima</h5>
            <button class="btn btn-sm btn-light" onclick="location.reload()">Osvježi</button>
        </div>
        <div class="card-body">
            <table id="ticketsTable" class="table table-hover align-middle w-100">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Korisnik</th>
                        <th>Status</th>
                        <th>Tip</th>
                        <th>Putanja</th>
                        <th>Ocjena</th>
                        <th>Vrijeme</th>
                    </tr>
                </thead>
                <tbody>
                    {{ table_rows }}
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer class="mt-5 mb-4 text-center text-muted">
    <small>Developed by <strong>piopet 2026</strong></small>
</footer>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    async function updateStatus(id, status) {
        let formData = new FormData();
        formData.append('ticket_id', id);
        formData.append('new_status', status);
        await fetch('/update-status', { method: 'POST', body: formData });
    }

    $(document).ready(function() {
        $('#ticketsTable').DataTable({ 
            "order": [[ 0, "desc" ]],
            "language": { "url": "//cdn.datatables.net/plug-ins/1.13.6/i18n/hr.json" }
        });
    });
</script>
</body>
</html>
